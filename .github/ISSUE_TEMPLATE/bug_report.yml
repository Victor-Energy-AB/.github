name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
      label: 🧩 What happened?
      description: Clear, short description of the issue
      placeholder: Something isn't working as expected...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔁 Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: 🖥️ Environment
      options:
        - Dev
        - QA
        - Prod
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 🔢 Version / Build (optional)
      placeholder: e.g. v1.4.2

  - type: textarea
    id: logs
    attributes:
      label: 📸 Screenshots / Logs
      description: Paste any relevant logs or screenshots

  - type: textarea
    id: notes
    attributes:
      label: 📝 Additional notes
      placeholder: Anything else that might help
