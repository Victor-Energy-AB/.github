name: Bug
description: Report a bug or problem
title: "[BUG] "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug you encountered.
      placeholder: What is broken or not working?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the issue, if applicable.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See problem.
    validations:
      required: false

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module/component does this bug relate to?
      options:
        - new
        - general
        - construction tracking
        - quality documents
        - maps
        - timesheets
        - daily reporting
        - invoicing
        - fleet
        - admin
        - reporting
        - analytics
    validations:
      required: true

  - type: textarea
    id: release_notes
    attributes:
      label: Release Notes Description
      description: Write what should appear in the release notes if this is closed.
      placeholder: Summary for release notes.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: You can paste images or upload screenshots here.
      placeholder: Drag and drop or paste screenshots, if helpful.

  - type: textarea
    id: documentation
    attributes:
      label: Backup Documentation
      description: Add or link to any backup documentation relevant to this bug.
      placeholder: Attach files or paste links to additional documentation.
