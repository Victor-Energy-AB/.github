name: Feature
description: Propose a new feature or enhancement
title: "[FEATURE] "
labels:
  - enhancement
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature or enhancement you are requesting.
      placeholder: Please describe the requested feature.
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module/component does this feature relate to?
      options:
        - new
        - general
        - construction tracking
        - quality documents
        - maps
        - timesheets
        - daily reporting
        - invoicing
        - fleet
        - admin
        - reporting
        - analytics
    validations:
      required: true

  - type: textarea
    id: release_notes
    attributes:
      label: Release Notes Description
      description: Write what should appear in the release notes if this is closed.
      placeholder: Summary for release notes.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: You can paste images or upload screenshots here.
      placeholder: Drag and drop or paste screenshots, if helpful.

  - type: textarea
    id: documentation
    attributes:
      label: Backup Documentation
      description: Add or link to any backup documentation relevant to this feature.
      placeholder: Attach files or paste links to additional documentation.
