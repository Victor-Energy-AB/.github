name: Task
description: Track a specific task or chore
title: "[TASK] "
labels:
  - task
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the task to be completed.
      placeholder: What needs to be done?
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module/component does this task relate to?
      options:
        - new
        - general
        - construction tracking
        - quality documents
        - maps
        - timesheets
        - daily reporting
        - invoicing
        - fleet
        - admin
        - reporting
        - analytics
    validations:
      required: true

  - type: textarea
    id: release_notes
    attributes:
      label: Release Notes Description
      description: Write what should appear in the release notes if this is closed.
      placeholder: Summary for release notes.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: You can paste images or upload screenshots here.
      placeholder: Drag and drop or paste screenshots, if helpful.

  - type: textarea
    id: documentation
    attributes:
      label: Backup Documentation
      description: Add or link to any backup documentation relevant to this task.
      placeholder: Attach files or paste links to additional documentation.
